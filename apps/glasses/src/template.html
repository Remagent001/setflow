<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1, user-scalable=no">
<title>SetFlow</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d1117">
<style>
  /* Meta Ray-Ban Display rules: 600x600, black = transparent, bright text,
     no scrolling. Neural Band: swipes = arrow keys, pinch = Enter,
     middle-finger pinch = Escape. Same keys drive it on a desktop. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; overflow: hidden; }
  #stage {
    width: 600px; height: 600px; margin: 0 auto; background: #000;
    color: #eaffff; font-family: system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 20px; padding: 48px;
    position: relative;
  }
  .dim  { color: #9adfff; opacity: .85; font-size: 26px; }
  .mid  { font-size: 34px; font-weight: 600; }
  .big  { font-size: 58px; font-weight: 800; line-height: 1.08; }
  .huge { font-size: 96px; font-weight: 800; }
  .green { color: #7dffc8; }
  .tiny  { color: #9adfff; opacity: .55; font-size: 22px; }
  /* progress bar across today's plan */
  #progress {
    position: absolute; top: 0; left: 0; right: 0; height: 8px;
    background: #0e2230; display: none;
  }
  #progressfill { height: 100%; width: 0%; background: #7dffc8; transition: width .3s ease; }
  /* small label: which day + exercise number */
  #topbar {
    position: absolute; top: 22px; left: 0; right: 0;
    color: #9adfff; opacity: .7; font-size: 20px; font-weight: 600;
  }
  #hint {
    position: absolute; bottom: 22px; left: 0; right: 0;
    color: #9adfff; opacity: .6; font-size: 19px; padding: 0 24px;
  }
  /* the "you should be lifting now" indicator */
  .lift {
    display: inline-flex; align-items: center; gap: 14px;
    color: #7dffc8; font-weight: 800; font-size: 30px; letter-spacing: 3px;
  }
  .lift .dot {
    width: 24px; height: 24px; border-radius: 50%; background: #7dffc8;
    box-shadow: 0 0 20px #7dffc8; animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1);    opacity: 1;   }
    50%      { transform: scale(1.55); opacity: .45; }
  }
  /* day-picker dots */
  .dots { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
  .dots span { width: 12px; height: 12px; border-radius: 50%; background: #24414f; }
  .dots span.on { background: #7dffc8; box-shadow: 0 0 10px #7dffc8; }
  /* home: day grid of cards */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 504px; }
  .daycard {
    background: #0e1a22; border: 2px solid #24414f; border-radius: 16px;
    padding: 16px 18px; text-align: left; position: relative;
  }
  .daycard .dn { font-size: 26px; font-weight: 800; color: #eaffff; }
  .daycard .dt { font-size: 22px; color: #9adfff; margin-top: 2px; }
  .daycard .dc { font-size: 16px; color: #6a8290; margin-top: 6px; }
  .daycard.done { opacity: .3; }
  .daycard .check { position: absolute; top: 12px; right: 14px; color: #7dffc8; font-size: 24px; }
  .daycard.sel { border-color: #7dffc8; box-shadow: 0 0 20px rgba(125, 255, 200, .55); }
  .daycard.done.sel { opacity: .7; }
  /* mid-workout menu */
  .menuitem { font-size: 36px; font-weight: 700; color: #9adfff; opacity: .55; padding: 10px 0; }
  .menuitem.sel { color: #7dffc8; opacity: 1; }
  /* summary: every exercise for the day */
  .exlist { display: flex; flex-direction: column; gap: 8px; width: 504px; }
  .exrow {
    background: #0e1a22; border: 2px solid #24414f; border-radius: 12px;
    padding: 10px 16px; text-align: left; position: relative;
  }
  .exrow .en { font-size: 22px; font-weight: 700; color: #eaffff; }
  .exrow .es { font-size: 15px; color: #6a8290; margin-top: 2px; }
  .exrow.done { opacity: .35; }
  .exrow .check { position: absolute; top: 10px; right: 14px; color: #7dffc8; font-size: 19px; }
  .exrow.sel { border-color: #7dffc8; box-shadow: 0 0 16px rgba(125, 255, 200, .5); }
  .exrow.done.sel { opacity: .7; }
</style>
</head>
<body>
<div id="stage">
  <div id="progress"><div id="progressfill"></div></div>
  <div id="topbar"></div>
  <div id="card"></div>
  <div id="hint"></div>
</div>
<script>/*__APP__*/</script>
</body>
</html>
